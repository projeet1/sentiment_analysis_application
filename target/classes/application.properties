# Scheduling — bridges POLL_INTERVAL_MS env var to the @Scheduled expression
app.poll.interval-ms=${POLL_INTERVAL_MS:60000}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}

# News source selection and mock biases
MOCK_NEWS=${MOCK_NEWS:false}
SPY_BIAS=${SPY_BIAS:0.65}
QQQ_BIAS=${QQQ_BIAS:0.6}
TLT_BIAS=${TLT_BIAS:0.45}
GLD_BIAS=${GLD_BIAS:0.55}
USO_BIAS=${USO_BIAS:0.4}

NEWS_SOURCE=${NEWS_SOURCE:template}
FINNHUB_API_KEY=${FINNHUB_API_KEY:}
GEMINI_API_KEY=${GEMINI_API_KEY:}

# LLM safety controls
# USE_LLM_SENTIMENT=false means the app NEVER calls Gemini (safe default)
USE_LLM_SENTIMENT=${USE_LLM_SENTIMENT:false}
MAX_LLM_CALLS_PER_MINUTE=${MAX_LLM_CALLS_PER_MINUTE:8}
LLM_DISABLE_ON_ERROR=${LLM_DISABLE_ON_ERROR:true}

# Poll volume controls
POLL_ARTICLES_PER_TICKER=${POLL_ARTICLES_PER_TICKER:1}
