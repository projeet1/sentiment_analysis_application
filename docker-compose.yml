name: acp-cw3

services:

  kafka:
    image: apache/kafka-native
    container_name: kafka
    networks:
      - acp_network
    ports:
      - "9092:9092"
    environment:
      KAFKA_LISTENERS: CONTROLLER://localhost:9091,HOST://0.0.0.0:9092,DOCKER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,DOCKER://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,DOCKER:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9091
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    networks:
      - acp_network
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: redis
    networks:
      - acp_network
    ports:
      - "6379:6379"
    command: redis-server --protected-mode no

  localstack:
    image: localstack/localstack:latest
    container_name: localstack
    networks:
      - acp_network
    ports:
      - "4566:4566"
    environment:
      SERVICES: dynamodb
      DEFAULT_REGION: us-east-1
    volumes:
      - ./init-dynamodb.sh:/etc/localstack/init/ready.d/init-dynamodb.sh

  app:
    build: .
    container_name: cw3-app
    networks:
      - acp_network
    ports:
      - "8080:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
      localstack:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DYNAMODB_ENDPOINT: http://localstack:4566
      DYNAMODB_TABLE: trade-signals
      AWS_ACCESS_KEY: test
      AWS_SECRET_KEY: test
      NEWS_API_KEY: ${NEWS_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TICKERS: AAPL,TSLA,MSFT,GOOGL
      NEWS_SOURCE: "finnhub"
      FINNHUB_API_KEY: ${FINNHUB_API_KEY}
      # To use Finnhub:   set NEWS_SOURCE=finnhub in .env
      # To use NewsAPI:   set NEWS_SOURCE=newsapi in .env
      # Local mode (default): NEWS_SOURCE=template
      AAPL_BIAS: "0.8"
      TSLA_BIAS: "0.2"
      MSFT_BIAS: "0.65"
      GOOGL_BIAS: "0.5"
      MOCK_SENTIMENT: "true"
      BUY_THRESHOLD: "0.15"
      SELL_THRESHOLD: "-0.15"
      # Restore to 0.3/-0.3 for real API demo
      POLL_INTERVAL_MS: "30000"  # change to 60000 for production

networks:
  acp_network:
    driver: bridge